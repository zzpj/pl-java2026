openapi: 3.0.0
info:
  title: Health Check API
  description: Prosty serwis do monitorowania stanu dostępności aplikacji.
  version: 1.0.0
servers:
  - url: http://localhost:8079
    description: Serwer lokalny

paths:
  /health:
    get:
      summary: Sprawdza status aplikacji
      description: Zwraca informację, czy aplikacja działa poprawnie (UP) czy napotkała błędy (DOWN).
      responses:
        '200':
          description: Zapytanie powiodło się
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [UP, DOWN]
                    example: "UP"
        '503':
          description: Serwis jest niedostępny lub wystąpił błąd krytyczny
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "DOWN"