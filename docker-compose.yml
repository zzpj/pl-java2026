services:
  postgres-db:
    image: postgres:17
    container_name: postgres-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - postgres_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  config-server:
    build:
      context: .
      dockerfile: config-server/Dockerfile
    container_name: config-server
    environment:
      SERVER_PORT: 8888
      SPRING_CLOUD_CONFIG_SERVER_GIT_TIMEOUT: 30
      SPRING_CLOUD_CONFIG_SERVER_GIT_CLONE_TIMEOUT: 120
      JAVA_TOOL_OPTIONS: -Dgit.timeout=30000
    ports:
      - "8888:8888"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8888/auth-server/default" ]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  eureka-server:
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    container_name: eureka-server
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      SERVER_PORT: 8761
      EUREKA_CLIENT_REGISTERWITHEUREKA: "false"
      EUREKA_CLIENT_FETCHREGISTRY: "false"
    ports:
      - "8761:8761"
    depends_on:
      config-server:
        condition: service_healthy
    restart: unless-stopped

  auth-server:
    build:
      context: .
      dockerfile: auth-server/Dockerfile
    container_name: auth-server
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      EUREKA_URL: http://eureka-server:8761/eureka/
      JAVA_TOOL_OPTIONS: -Dspring.profiles.active=default
    ports:
      - "8081:8081"
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_started
      postgres-db:
        condition: service_started
    restart: unless-stopped

  watermark-service:
    build:
      context: .
      dockerfile: watermark-service/Dockerfile
    container_name: watermark-service
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      EUREKA_URL: http://eureka-server:8761/eureka/
    ports:
      - "8082:8082"
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_started
    restart: unless-stopped

  watermark-client:
    build:
      context: .
      dockerfile: watermark-client/Dockerfile
    container_name: watermark-client
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      EUREKA_URL: http://eureka-server:8761/eureka/
    ports:
      - "8083:8083"
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_started
      watermark-service:
        condition: service_started
      auth-server:
        condition: service_started
    restart: unless-stopped

  sonarqube-db:
    image: postgres:16
    container_name: sonarqube-db
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonarqube
    volumes:
      - sonarqube_db:/var/lib/postgresql/data
    restart: unless-stopped

  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    ports:
      - "9000:9000"
    depends_on:
      - sonarqube-db
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    restart: unless-stopped

  sonar-scan:
    image: gradle:8.14.4-jdk21
    working_dir: /workspace
    profiles: ["tools"]
    env_file:
      - .env
    environment:
      SONAR_HOST_URL: http://sonarqube:9000
    command:
      - /bin/sh
      - -lc
      - >
        gradle --no-daemon
        :auth-server:sonar
        :config-server:sonar
        :eureka-server:sonar
        :watermark-service:sonar
        :watermark-client:sonar
        -Dsonar.host.url=http://sonarqube:9000
        -Dsonar.token=$$SONARQUBE_TOKEN
    volumes:
      - ./:/workspace
      - gradle_cache:/home/gradle/.gradle
    depends_on:
      - sonarqube

volumes:
  sonarqube_db:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  gradle_cache:
  postgres_db_data:

