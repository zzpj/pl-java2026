services:
  config-server:
    build:
      context: .
      dockerfile: config-server/Dockerfile
    container_name: config-server
    environment:
      SERVER_PORT: 8888
      SPRING_CLOUD_CONFIG_SERVER_GIT_TIMEOUT: 30
      SPRING_CLOUD_CONFIG_SERVER_GIT_CLONE_TIMEOUT: 120
      JAVA_TOOL_OPTIONS: -Dgit.timeout=30000
    ports:
      - "8888:8888"
    restart: unless-stopped

  eureka-server:
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    container_name: eureka-server
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SERVER_PORT: 8761
      EUREKA_CLIENT_REGISTERWITHEUREKA: "false"
      EUREKA_CLIENT_FETCHREGISTRY: "false"
    ports:
      - "8761:8761"
    depends_on:
      - config-server
    restart: unless-stopped

  auth-server:
    build:
      context: .
      dockerfile: auth-server/Dockerfile
    container_name: auth-server
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      JAVA_TOOL_OPTIONS: -Deureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
      SERVER_PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      - config-server
      - eureka-server
    restart: unless-stopped

  watermark-service:
    build:
      context: .
      dockerfile: watermark-service/Dockerfile
    container_name: watermark-service
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      JAVA_TOOL_OPTIONS: -Deureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
      SERVER_PORT: 8082
    ports:
      - "8082:8082"
    depends_on:
      - config-server
      - eureka-server
    restart: unless-stopped

  watermark-client:
    build:
      context: .
      dockerfile: watermark-client/Dockerfile
    container_name: watermark-client
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      JAVA_TOOL_OPTIONS: -Deureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
      SERVER_PORT: 8083
    ports:
      - "8083:8083"
    depends_on:
      - config-server
      - eureka-server
      - watermark-service
      - auth-server
    restart: unless-stopped

  sonarqube-db:
    image: postgres:16
    container_name: sonarqube-db
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonarqube
    volumes:
      - sonarqube_db:/var/lib/postgresql/data
    restart: unless-stopped

  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    ports:
      - "9000:9000"
    depends_on:
      - sonarqube-db
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    restart: unless-stopped

  sonar-scan:
    image: gradle:8.14.4-jdk21
    working_dir: /workspace
    profiles: ["tools"]
    env_file:
      - .env
    environment:
      SONAR_HOST_URL: http://sonarqube:9000
    command:
      - /bin/sh
      - -lc
      - >
        gradle --no-daemon
        :auth-server:classes
        :config-server:classes
        :eureka-server:classes
        :watermark-service:classes
        :watermark-client:classes
        :auth-server:sonar
        :config-server:sonar
        :eureka-server:sonar
        :watermark-service:sonar
        :watermark-client:sonar
        -Dsonar.host.url=http://sonarqube:9000
        -Dsonar.token=$$SONARQUBE_TOKEN
    volumes:
      - ./:/workspace
      - gradle_cache:/home/gradle/.gradle
    depends_on:
      - sonarqube

volumes:
  sonarqube_db:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  gradle_cache:

